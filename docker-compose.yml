services:
  redis:
    image: redis:7.0-alpine
    ports:
      - ${REDIS_PORT}:6379
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    command: /bin/sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    restart: always

  db:
    image: postgres:14
    ports:
      - ${DB_MAIN_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_MAIN_USER}
      POSTGRES_PASSWORD: ${DB_MAIN_PASSWORD}
      POSTGRES_DB_MAIN: ${DB_NAME_DEV}
      POSTGRES_DB_TEST: ${DB_NAME_TEST}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/initdb.sh:/docker-entrypoint-initdb.d/initdb.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_MAIN_USER} -d ${DB_NAME_DEV}']
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  redis_data:
  pg_data:
