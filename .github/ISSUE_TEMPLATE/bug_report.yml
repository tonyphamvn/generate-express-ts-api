name: Bug report
description: Report a bug in generate-express-ts-api or a generated project
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill out the sections below so we can reproduce and fix it quickly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where did the bug occur?
      options:
        - CLI / scaffolding
        - Generated Express API
        - Docker / deploy
        - Database / MikroORM
        - Auth / JWT
        - Socket.IO
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps that trigger the bug.
      placeholder: |
        1. Run `npx generate-express-ts-api my-api --deploy docker`
        2. ...
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include logs or stack traces if available.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package / template version
      description: e.g. `generate-express-ts-api@0.0.2` or the version in your generated `package.json`
      placeholder: 0.0.2
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, package manager, and deploy mode if relevant.
      value: |
        - OS:
        - Node.js:
        - npm / pnpm / yarn:
        - Deploy mode: docker / pm2 / none
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, workarounds, or anything else that helps.
    validations:
      required: false
